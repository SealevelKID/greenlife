<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺灣綠生活資訊站 - 環保旅宿</title>

    <link rel="stylesheet" href="css/global_style.css">
    <link rel="stylesheet" href="css/facilities_style.css">

    <!-- 引入 SheetJS 處理 ODS/Excel 檔案 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
</head>
<!-- 自訂彈出視窗 (Modal) -->
<div id="custom-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <div class="modal-header" id="modal-title">提示</div>
        <div class="modal-body" id="modal-message">訊息內容</div>
        <button id="modal-close-btn" class="modal-btn">我知道了</button>
    </div>
</div>

<body>

    <nav id="global-navbar">
        <div class="logo">臺灣綠生活資訊站</div>
        <ul class="nav-links">
            <li><a href="index.html">回到主頁</a></li>
            <li><a href="accommodations.html" class="active">環保旅宿</a></li>
        </ul>
    </nav>

    <main id="facilities-content">
        <!-- 頂部區塊：上傳按鈕與狀態 -->
        <section class="page-header-compact"
            style="display: flex; justify-content: space-between; align-items: center;">

            <!-- 1. 左側：統一的上傳按鈕與進度條 -->
            <div style="flex: 1.5; text-align: left; display: flex; align-items: center; gap: 15px;">
                <input type="file" id="file-upload" accept=".ods, .xlsx, .xls" style="display: none;">
                <!-- 按鈕樣式與綠色商店完全對齊 -->
                <button id="trigger-upload"
                    style="padding: 8px 20px; background-color: #059669; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; white-space: nowrap;">
                    上傳檔案
                </button>

                <!-- 新增：狀態指示區 -->
                <div id="upload-progress"
                    style="display: flex; gap: 10px; font-size: 14px; font-weight: bold; color: #9ca3af; white-space: nowrap;">
                    <span id="status-step1">⚪ 1. 旅宿名單</span>
                    <span id="status-step2">⚪ 2. 日期檔案</span>
                </div>
            </div>

            <!-- 2. 中間：標題 -->
            <h1 class="header-center" style="flex: 1; text-align: center; margin: 0; white-space: nowrap;">環保旅宿查詢系統</h1>

            <!-- 3. 右側：為了平衡版面，將下拉選單移至右側 -->
            <div class="header-right"
                style="flex: 1.5; text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">

                <div id="control-panel" style="display: none; align-items: center; gap: 5px;">
                    <label for="city-dropdown" style="margin: 0; font-weight: bold; white-space: nowrap;">查詢縣市：</label>
                    <select id="city-dropdown" style="padding: 5px;">
                        <option value="all">全台總數概覽</option>
                        <option disabled>─── 直轄市 ───</option>
                        <option value="台北市">臺北市</option>
                        <option value="新北市">新北市</option>
                        <option value="桃園市">桃園市</option>
                        <option value="台中市">臺中市</option>
                        <option value="台南市">臺南市</option>
                        <option value="高雄市">高雄市</option>
                        <option disabled>─── 其他縣市 ───</option>
                        <option value="基隆市">基隆市</option>
                        <option value="新竹市">新竹市</option>
                        <option value="新竹縣">新竹縣</option>
                        <option value="苗栗縣">苗栗縣</option>
                        <option value="彰化縣">彰化縣</option>
                        <option value="南投縣">南投縣</option>
                        <option value="雲林縣">雲林縣</option>
                        <option value="嘉義市">嘉義市</option>
                        <option value="嘉義縣">嘉義縣</option>
                        <option value="屏東縣">屏東縣</option>
                        <option value="宜蘭縣">宜蘭縣</option>
                        <option value="花蓮縣">花蓮縣</option>
                        <option value="台東縣">臺東縣</option>
                        <option value="澎湖縣">澎湖縣</option>
                        <option value="金門縣">金門縣</option>
                        <option value="連江縣">連江縣</option>
                    </select>
                </div>

                <div style="display: flex; align-items: center; gap: 10px;">
                    <span id="update-date" class="update-date-inline">等待上傳資料...</span>
                    <div id="upload-status" style="color: #4b5563; font-size: 14px;"></div>
                </div>
            </div>
        </section>
        
        <!-- 排名總覽 (預設隱藏，上傳後顯示) -->
        <section id="overview-view" style="display: none;">
            <div class="table-responsive-wrapper">
                <div class="detail-header">
                    <!-- 讓標題與標籤水平並排且一起置中，中間留 15px 的空隙 -->
                    <div class="header-main-info"
                        style="display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%;">
                        <h2 style="margin: 0;">各縣市旅宿數量排名</h2>
                        <span id="total-stats" class="stats-text"></span>
                    </div>
                </div>
                <table id="facilities-table" class="ranking-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>縣市別</th>
                            <th>旅宿數量</th>
                            <th>全國佔比</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-table-body">
                        <!-- JS 動態產生排名 -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 詳細資料區塊 (選擇縣市後顯示) -->
        <section id="detail-view" style="display: none;">
            <div class="table-responsive-wrapper">
                <div class="detail-header"
                    style="display: flex; justify-content: space-between; align-items: center; width: 100%;">

                    <!-- 左側：標題與統計區塊 -->
                    <div class="header-main-info" style="display: flex; align-items: center; gap: 15px;">
                        <h2 id="current-city-title" style="margin: 0;">縣市詳細資料</h2>
                        <span id="city-stats" class="stats-text"></span>
                    </div>

                    <!-- 右側：操作與狀態區塊 -->
                    <div class="header-action-area" style="display: flex; align-items: center; gap: 10px;">
                        <div id="status-summary" class="status-summary-compact"></div>

                        <label for="status-filter" style="margin: 0; white-space: nowrap;">狀態：</label>
                        <select id="status-filter" style="padding: 5px;">
                            <option value="all">顯示全部</option>
                            <option value="warning">即將到期 (8個月內)</option>
                            <option value="expired">已過期</option>
                        </select>

                        <button id="btn-back-overview"
                            style="background: none; border: none; cursor: pointer; font-size: 1.5rem; padding: 0; margin-left: 10px;"
                            title="返回全台總覽">
                            🔙
                        </button>
                    </div>

                </div>

                <table id="facilities-table">
                    <thead>
                        <tr>
                            <th>標章等級</th> <!-- 新增的等級欄位 -->
                            <th>旅宿名稱</th>
                            <th>聯絡地址</th>
                            <th>證書到期日/狀態</th> <!-- 結合日期與警示圖示 -->
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- JS 動態產生旅宿名單 -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/global_script.js"></script>
    <script src="js/accommodations_script.js"></script> <!-- 等等要建立的 JS -->
    <footer class="site-footer source-footer">
        <a href="https://greenlifestyle.moenv.gov.tw/categories/accommodation" target="_blank"
            rel="noopener noreferrer">
            資料來源：淨零綠生活資訊平台 - 環保旅宿查詢
        </a>
    </footer>
</body>

</html>
